repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: pretty-format-json
      args: [--autofix]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.22
  hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format
- repo: https://github.com/scop/pre-commit-shfmt
  rev: v3.13.1-1
  hooks:
    - id: shfmt
- repo: local
  hooks:
    - id: cargo-fmt
      name: cargo fmt
      entry: cargo fmt --manifest-path Cargo.toml
      language: system
      pass_filenames: false
    - id: cargo-check
      name: cargo check
      entry: cargo check --manifest-path Cargo.toml
      language: system
      pass_filenames: false
    - id: cargo-test
      name: cargo test
      entry: cargo test --manifest-path Cargo.toml
      language: system
      pass_filenames: false
